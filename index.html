<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/diary.svg" />
    <!-- 移动端视口优化：支持刘海屏 (viewport-fit=cover) 并锁定缩放 (user-scalable=no) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>滴答日记 | 记录你的心跳</title>
    <!-- SEO 元数据 -->
    <meta name="description" content="滴答日记是一款极致纯粹的移动端日记应用，支持 Markdown 写作、标签分类、日期搜索、表情记录、数据备份与双重密码保护。记录每一个温柔瞬间。" />
    <meta name="keywords" content="滴答日记, 日记, 笔记, Markdown, 隐私日记, 移动日记, 表情日记, 时光记录, Dida, Diary" />
    <meta name="author" content="滴答日记团队" />
    <!-- Open Graph 社交媒体分享标签 -->
    <meta property="og:title" content="滴答日记 - 记录你的心跳" />
    <meta property="og:description" content="记录每一个温柔瞬间，守护心灵时光长廊。极致纯粹的移动端日记体验。" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="/" />
    <meta property="og:image" content="/diary.svg" />
    <!-- 品牌主题色：同步至移动端浏览器状态栏 -->
    <meta name="theme-color" content="#f97316" />
    <!-- PWA Manifest 声明 -->
    <link rel="manifest" href="/manifest.json" />
    <!-- iOS 专用 Web App 支持 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="滴答日记" />
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
